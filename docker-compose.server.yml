services:
  nginx:
    image: nginx:1.27-alpine
    container_name: baozhi-rag-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "6888:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health/live"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 服务端部署默认走腾讯云镜像源；如需切换，可在 .env 中覆盖。
        APT_MIRROR: ${APP_BUILD_APT_MIRROR:-https://mirrors.cloud.tencent.com}
        PYPI_MIRROR: ${APP_BUILD_PYPI_MIRROR:-https://mirrors.cloud.tencent.com/pypi/simple}
    image: baozhi-rag-app:latest
    container_name: baozhi-rag-app
    env_file:
      - path: .env
        required: true
      - path: .env.${APP_ENV:-development}
        required: false
    environment:
      APP_ENV: server
      APP_DEBUG: "false"
      UPLOAD_ROOT_DIR: /app/data/uploads
      DOC_CONVERT_TEMP_DIR: /app/data/tmp/converted
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-baozhi_rag}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-baozhi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-baozhi123456}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret-before-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_DAYS: ${JWT_ACCESS_TOKEN_EXPIRE_DAYS:-7}
      OSS_REGION: ${OSS_REGION:-cn-hangzhou}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-https://oss-cn-hangzhou.aliyuncs.com}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_OBJECT_PREFIX: ${OSS_OBJECT_PREFIX:-knowledge-files}
      ES_URL: http://elasticsearch:9200
      ES_USERNAME: ${ES_USERNAME:-elastic}
      ES_PASSWORD: ${ES_PASSWORD:?请在.env中配置ES_PASSWORD}
      ES_API_KEY: ${ES_API_KEY:-}
      ES_VERIFY_CERTS: ${ES_VERIFY_CERTS:-false}
      MILVUS_URI: http://milvus:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN:?请在.env中配置MILVUS_TOKEN，格式user:password}
    expose:
      - "8000"
    volumes:
      - app_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/health/live >/dev/null || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: baozhi-rag-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-baozhi_rag}
      MYSQL_USER: ${MYSQL_USERNAME:-baozhi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-baozhi123456}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  elasticsearch:
    build:
      context: .
      dockerfile: docker/elasticsearch-ik/Dockerfile
      args:
        ES_VERSION: 8.19.10
    image: baozhi-elasticsearch-ik:8.19.10
    container_name: baozhi-elasticsearch
    environment:
      ELASTIC_PASSWORD: ${ES_PASSWORD:?请在.env中配置ES_PASSWORD}
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.license.self_generated.type: basic
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      bootstrap.memory_lock: "true"
    ports:
      - "${ES_PUBLISH_ADDRESS:-127.0.0.1:9200}:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -u elastic:$${ELASTIC_PASSWORD} http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: baozhi-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls
      - http://0.0.0.0:2379
      - --data-dir
      - /etcd
    volumes:
      - milvus_etcd_data:/etcd
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "--endpoints=http://127.0.0.1:2379",
          "endpoint",
          "health",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: baozhi-milvus-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - milvus_minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.6.11
    container_name: baozhi-milvus
    command:
      - /bin/sh
      - -ec
      - |
        cat >/milvus/configs/user.yaml <<EOF
        common:
          security:
            authorizationEnabled: true
            defaultRootPassword: "${MILVUS_ROOT_PASSWORD:?请在.env中配置MILVUS_ROOT_PASSWORD}"
        EOF
        exec milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "${MILVUS_PUBLISH_ADDRESS:-127.0.0.1:19530}:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9091/healthz"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

volumes:
  app_data:
  mysql_data:
  elasticsearch_data:
  milvus_etcd_data:
  milvus_minio_data:
  milvus_data:




